name: pocketmonk
description: PocketMonk — fully offline, private AI assistant running on-device via llama.cpp

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # LLM inference — llama.cpp Flutter bindings
  fllama:
    git:
      url: https://github.com/Telosnex/fllama.git
      ref: main

  # UI utilities
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1

  # State management — lightweight, no boilerplate
  provider: ^6.1.2

  # Utilities
  http: ^1.2.2
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  intl: ^0.19.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/system_prompt.txt
